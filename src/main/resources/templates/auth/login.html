<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Login')}"></head>
<body>

<nav th:replace="~{fragments/base :: navbar}"></nav>

<h1>Login</h1>

<!-- messaggio di errore se le credenziali sono sbagliate -->
<div th:if="${param.error}">Username o password errati</div>

<form th:action="@{/login}" method="post">
  <div>
    <label for="username">Username:</label>
    <input type="text" id="username" name="username"/>
  </div>
  <div>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password"/>
  </div>
  <button type="submit">Accedi</button>
</form>

<a th:href="@{/register}">Non hai un account? Registrati</a>

<footer th:replace="~{fragments/base :: footer}"></footer>

</body>
</html>
