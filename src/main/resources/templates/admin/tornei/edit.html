<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Modifica Torneo')}"></head>
<body>

<nav th:replace="~{fragments/base :: navbar}"></nav>

<h1>Modifica torneo</h1>

<form th:action="@{'/admin/tornei/' + ${torneo.id} + '/edit'}" th:object="${torneo}" method="post">
  <input type="hidden" th:field="*{id}"/>
  <div>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" th:field="*{nome}"/>
    <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Errore nome</span>
  </div>
  <div>
    <label for="anno">Anno:</label>
    <input type="text" id="anno" th:field="*{anno}"/>
    <span th:if="${#fields.hasErrors('anno')}" th:errors="*{anno}">Errore anno</span>
  </div>
  <div>
    <label for="descrizione">Descrizione:</label>
    <input type="text" id="descrizione" th:field="*{descrizione}"/>
    <span th:if="${#fields.hasErrors('descrizione')}" th:errors="*{descrizione}">Errore descrizione</span>
  </div>
  <button type="submit">Salva</button>
</form>

<a th:href="@{'/tornei/' + ${torneo.id}}">Annulla</a>

<footer th:replace="~{fragments/base :: footer}"></footer>

</body>
</html>
