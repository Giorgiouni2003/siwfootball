<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Nuovo Torneo')}"></head>
<body>

<nav th:replace="~{fragments/base :: navbar}"></nav>

<h1>Crea nuovo torneo</h1>

<form th:action="@{/admin/tornei/new}" th:object="${torneo}" method="post">
  <div>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" th:field="*{nome}"/>
  </div>
  <div>
    <label for="anno">Anno:</label>
    <input type="text" id="anno" th:field="*{anno}"/>
  </div>
  <div>
    <label for="descrizione">Descrizione:</label>
    <input type="text" id="descrizione" th:field="*{descrizione}"/>
  </div>
  <button type="submit">Salva</button>
</form>

<a th:href="@{/tornei}">Annulla</a>

<footer th:replace="~{fragments/base :: footer}"></footer>

</body>
</html>
