<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Nuova Squadra')}"></head>
<body>

<nav th:replace="~{fragments/base :: navbar}"></nav>

<h1>Crea nuova squadra</h1>

<form th:action="@{/admin/squadre/new}" th:object="${squadra}" method="post">
  <div>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" th:field="*{nome}"/>
  </div>
  <div>
    <label for="annoDiFondazione">Anno di fondazione:</label>
    <input type="text" id="annoDiFondazione" th:field="*{annoDiFondazione}"/>
  </div>
  <div>
    <label for="citta">Città:</label>
    <input type="text" id="citta" th:field="*{citta}"/>
  </div>
  <button type="submit">Salva</button>
</form>

<a th:href="@{/squadre}">Annulla</a>

<footer th:replace="~{fragments/base :: footer}"></footer>

</body>
</html>
