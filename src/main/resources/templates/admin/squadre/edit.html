<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Modifica Squadra')}"></head>
<body>

<nav th:replace="~{fragments/base :: navbar}"></nav>

<h1> Modifica squadra</h1>

<form th:action="@{'/admin/squadre/' + ${squadra.id} + '/edit'}" th:object="${squadra}" method="post">
  <input type="hidden" th:field="*{id}"/>
  <div>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" th:field="*{nome}"/>
    <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Errore nome</span>
  </div>
  <div>
    <label for="annoDiFondazione">Anno di fondazione:</label>
    <input type="text" id="annoDiFondazione" th:field="*{annoDiFondazione}"/>
    <span th:if="${#fields.hasErrors('annoDiFondazione')}" th:errors="*{annoDiFondazione}">Errore anno</span>
  </div>
  <div>
    <label for="citta">Città:</label>
    <input type="text" id="citta" th:field="*{citta}"/>
    <span th:if="${#fields.hasErrors('citta')}" th:errors="*{citta}">Errore città</span>
  </div>
  <button type="submit">Salva</button>
</form>

<a th:href="@{'/squadre/' + ${squadra.id}}">Annulla</a>



<footer th:replace="~{fragments/base :: footer}"></footer>

</body>
</html>
