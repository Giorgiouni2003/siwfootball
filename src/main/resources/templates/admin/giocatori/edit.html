<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Modifica Giocatore')}"></head>
<body>

<nav th:replace="~{fragments/base :: navbar}"></nav>

<h1>Modifica giocatore</h1>

<form th:action="@{'/admin/giocatori/' + ${giocatore.id} + '/edit'}" th:object="${giocatore}" method="post">
  <input type="hidden" th:field="*{id}"/>
  <div>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" th:field="*{nome}"/>
    <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Errore nome</span>
  </div>
  <div>
    <label for="cognome">Cognome:</label>
    <input type="text" id="cognome" th:field="*{cognome}"/>
    <span th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}">Errore cognome</span>
  </div>
  <div>
    <label for="dataDiNascita">Data di nascita:</label>
    <input type="text" id="dataDiNascita" th:field="*{dataDiNascita}"/>
    <span th:if="${#fields.hasErrors('dataDiNascita')}" th:errors="*{dataDiNascita}">Errore data di nascita</span>
  </div>
  <div>
    <label for="ruolo">Ruolo:</label>
    <input type="text" id="ruolo" th:field="*{ruolo}"/>
    <span th:if="${#fields.hasErrors('ruolo')}" th:errors="*{ruolo}">Errore ruolo</span>
  </div>
  <div>
    <label for="altezza">Altezza (cm):</label>
    <input type="number" id="altezza" th:field="*{altezza}"/>
    <span th:if="${#fields.hasErrors('altezza')}" th:errors="*{altezza}">Errore altezza</span>
  </div>

  <!-- menu a tendina per scegliere la squadra (preselezionata quella attuale) -->
  <div>
    <label for="squadra">Squadra:</label>
    <select id="squadra" name="squadra.id">
      <option th:each="squadra : ${squadre}"
              th:value="${squadra.id}"
              th:text="${squadra.nome}"
              th:selected="${giocatore.squadra != null and squadra.id == giocatore.squadra.id}">
        nome squadra
      </option>
    </select>
  </div>

  <button type="submit">Salva</button>
</form>

<a th:href="@{'/squadre/' + ${giocatore.squadra.id}}">Annulla</a>

<footer th:replace="~{fragments/base :: footer}"></footer>

</body>
</html>
